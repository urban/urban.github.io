<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Graph View Playwright Invalid Theme Harness</title>
    <style>
      :root {
        color-scheme: light;
        --page-bg: #f5f5f4;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: var(--page-bg);
      }

      #app {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="app"
      data-graph-snapshot-script-id="playwright-graph-snapshot"
      data-selected-node-id="alpha"
      data-light-graph-theme='{"view":{"backgroundColor":"nope"}}'
    ></div>
    <script id="playwright-graph-snapshot" type="application/json">
      {
        "schemaVersion": "2",
        "nodes": [
          {
            "id": "alpha",
            "kind": "note",
            "relativePath": "alpha.md",
            "permalink": "/alpha/",
            "label": "Alpha",
            "routePath": "/alpha"
          }
        ],
        "edges": [],
        "diagnostics": [],
        "indexes": {
          "nodesById": {
            "alpha": {
              "id": "alpha",
              "kind": "note",
              "relativePath": "alpha.md",
              "permalink": "/alpha/",
              "label": "Alpha",
              "routePath": "/alpha"
            }
          },
          "edgesBySourceNodeId": {},
          "edgesByTargetNodeId": {},
          "noteNodeIdBySlug": {},
          "noteNodeIdByRoutePath": {
            "/alpha": "alpha"
          }
        }
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
