    <script type="module">
      import { bootstrapGraphVisualizer } from "/src/main.ts"

      const selectionChanges = []
      let handle = null

      const setTheme = (theme) => {
        document.documentElement.classList.toggle("dark", theme === "dark")
      }

      const waitForAnimations = async () => {
        await new Promise((resolve) => window.setTimeout(resolve, 250))
      }

      await bootstrapGraphVisualizer({
        disableAnimations: true,
        onSelectionChange: (selection) => {
          selectionChanges.push(selection)
        },
        onReady: (graphHandle) => {
          handle = graphHandle
          handle.applyStaticLayout([
            { nodeId: "alpha", x: 320, y: 320 },
            { nodeId: "beta", x: 180, y: 210 },
            { nodeId: "gamma", x: 500, y: 190 },
            { nodeId: "delta", x: 690, y: 320 },
          ])
        },
      })

      window.__graphViewHarness = {
        getSelectionChanges: () => [...selectionChanges],
        clearSelectionChanges: () => {
          selectionChanges.length = 0
        },
        getNodePosition: (nodeId) => handle?.getNodePosition(nodeId) ?? null,
        getCanvasClientRect: () => {
          const rect = handle?.getCanvasClientRect()
          return rect
            ? {
                x: rect.x,
                y: rect.y,
                width: rect.width,
                height: rect.height,
                top: rect.top,
                right: rect.right,
                bottom: rect.bottom,
                left: rect.left,
              }
            : null
        },
        hoverNode: async (nodeId) => {
          handle?.hoverNode(nodeId)
          await waitForAnimations()
        },
        selectNode: async (nodeId) => {
          handle?.selectNode(nodeId)
          await waitForAnimations()
        },
        settleLayout: async (tickCount = 400) => {
          handle?.settleLayout(tickCount)
          await waitForAnimations()
        },
        setTheme: async (theme) => {
          setTheme(theme)
          await waitForAnimations()
        },
      }
    </script>
