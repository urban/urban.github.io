<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>D3 Force + Pixi</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0b0f14;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      .hint {
        position: fixed;
        left: 12px;
        top: 12px;
        color: #cbd5e1;
        font:
          12px/1.4 system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        opacity: 0.9;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="app" data-graph-snapshot-url="./src/graph-snapshot.json"></div>
    <div class="hint">Drag nodes. Drag background to pan. Use mouse wheel to zoom.</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
