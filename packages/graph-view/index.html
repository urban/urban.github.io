<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Graph View</title>
    <script>
      ;(function preloadColorScheme() {
        const isDark =
          localStorage.colorScheme === "dark" ||
          (!("colorScheme" in localStorage) &&
            window.matchMedia("(prefers-color-scheme: dark)").matches)

        if (isDark) {
          document.documentElement.classList.add("dark")
        } else {
          document.documentElement.classList.remove("dark")
        }
      })()
    </script>
    <style>
      :root {
        color-scheme: light;
        --page-bg: #f5f5f4;
        --panel-bg: rgba(255, 255, 255, 0.78);
        --panel-border: rgba(12, 10, 9, 0.12);
        --text: rgba(12, 10, 9, 0.72);
        --text-strong: #0c0a09;
        --button-hover: rgba(12, 10, 9, 0.05);
      }

      html.dark {
        color-scheme: dark;
        --page-bg: #0c0a09;
        --panel-bg: rgba(28, 25, 23, 0.72);
        --panel-border: rgba(245, 245, 244, 0.16);
        --text: rgba(245, 245, 244, 0.72);
        --text-strong: #f5f5f4;
        --button-hover: rgba(245, 245, 244, 0.08);
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: var(--page-bg);
        color: var(--text);
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        transition:
          background-color 0.2s ease,
          color 0.2s ease;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .hint,
      .controls-panel,
      .theme-controls {
        position: fixed;
        z-index: 1;
        backdrop-filter: blur(8px) saturate(160%);
        -webkit-backdrop-filter: blur(8px) saturate(160%);
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
      }

      .hint {
        left: 12px;
        top: 12px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 12px;
        line-height: 1.4;
        user-select: none;
      }

      .controls-panel {
        left: 12px;
        bottom: 12px;
        display: grid;
        gap: 12px;
        min-width: 220px;
        padding: 12px;
        border-radius: 16px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text-strong);
      }

      .toggle-row input {
        margin: 0;
      }

      .zoom-controls {
        display: flex;
        gap: 8px;
      }

      .control-button,
      .theme-button {
        display: flex;
        align-items: center;
        justify-content: center;
        border: 0;
        background: transparent;
        color: var(--text-strong);
        cursor: pointer;
        transition:
          background-color 0.2s ease,
          color 0.2s ease,
          opacity 0.2s ease;
      }

      .control-button {
        min-width: 40px;
        height: 40px;
        padding: 0 12px;
        border-radius: 999px;
        font-size: 18px;
        font-weight: 600;
      }

      .theme-controls {
        right: 12px;
        bottom: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        align-items: center;
        padding: 4px;
        border-radius: 999px;
      }

      .theme-button {
        width: 32px;
        height: 32px;
        border-radius: 999px;
      }

      .control-button:hover,
      .theme-button:hover {
        background: var(--button-hover);
      }

      .control-button:focus-visible,
      .theme-button:focus-visible {
        outline: 2px solid var(--text-strong);
        outline-offset: 2px;
      }

      .theme-button svg {
        width: 21px;
        height: 21px;
        fill: currentColor;
      }
    </style>
  </head>
  <body>
    <div
      id="app"
      data-graph-snapshot-url="/graph-snapshot.json"
      data-scroll-zoom-enabled="true"
      data-light-graph-theme='{"view":{"backgroundColor":16119285},"node":{"variants":{"default":{"fill":7893356,"stroke":16119284,"strokeWidth":1,"alpha":1},"selected":{"fill":789335,"stroke":16119284,"strokeWidth":2,"alpha":1},"muted":{"fill":14079761,"stroke":16119284,"strokeWidth":1,"alpha":0.45}},"scales":{"default":1,"selected":2,"muted":1}},"edge":{"variants":{"default":{"width":2,"color":5722958,"alpha":0.55},"muted":{"width":2,"color":11051678,"alpha":0.18}}},"label":{"variants":{"default":{"fill":789335,"alpha":1},"selected":{"fill":789335,"alpha":1},"muted":{"fill":7893356,"alpha":0.45}},"style":{"fontFamily":"Arial","fontSize":16,"fontWeight":"400"}}}'
      data-dark-graph-theme='{"view":{"backgroundColor":1777943},"node":{"variants":{"default":{"fill":11051678,"stroke":789335,"strokeWidth":1,"alpha":1},"selected":{"fill":16119284,"stroke":789335,"strokeWidth":2,"alpha":1},"muted":{"fill":4473924,"stroke":789335,"strokeWidth":1,"alpha":0.45}},"scales":{"default":1,"selected":2,"muted":1}},"edge":{"variants":{"default":{"width":2,"color":14079761,"alpha":0.5},"muted":{"width":2,"color":5722958,"alpha":0.25}}},"label":{"variants":{"default":{"fill":16119284,"alpha":1},"selected":{"fill":16119284,"alpha":1},"muted":{"fill":11051678,"alpha":0.45}},"style":{"fontFamily":"Arial","fontSize":16,"fontWeight":"400"}}}'
    ></div>
    <div class="hint">Drag nodes. Drag background to pan. Toggle wheel zoom as needed.</div>
    <div class="controls-panel" aria-label="Graph zoom controls">
      <label class="toggle-row" for="scroll-zoom-toggle">
        <input id="scroll-zoom-toggle" type="checkbox" checked />
        <span>Enable scroll zoom</span>
      </label>
      <div class="zoom-controls">
        <button id="zoom-out-button" class="control-button" type="button" aria-label="Zoom out">
          −
        </button>
        <button id="zoom-in-button" class="control-button" type="button" aria-label="Zoom in">
          +
        </button>
      </div>
    </div>
    <div class="theme-controls" aria-label="Color scheme controls">
      <button id="light-theme-button" class="theme-button" aria-label="Light theme" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" aria-hidden="true">

      <button id="dark-theme-button" class="theme-button" aria-label="Dark theme" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" aria-hidden="true">
          <path
            d="M233.54,142.23a8,8,0,0,0-8-2,88.08,88.08,0,0,1-109.8-109.8,8,8,0,0,0-10-10,104.84,104.84,0,0,0-52.91,37A104,104,0,0,0,136,224a103.09,103.09,0,0,0,62.52-20.88,104.84,104.84,0,0,0,37-52.91A8,8,0,0,0,233.54,142.23ZM188.9,190.34A88,88,0,0,1,65.66,67.11a89,89,0,0,1,31.4-26A106,106,0,0,0,96,56,104.11,104.11,0,0,0,200,160a106,106,0,0,0,14.92-1.06A89,89,0,0,1,188.9,190.34Z"
          ></path>
        </svg>
      </button>
      <button id="system-theme-button" class="theme-button" aria-label="System theme" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" aria-hidden="true">
          <path
            d="M208,40H48A24,24,0,0,0,24,64V176a24,24,0,0,0,24,24H208a24,24,0,0,0,24-24V64A24,24,0,0,0,208,40Zm8,136a8,8,0,0,1-8,8H48a8,8,0,0,1-8-8V64a8,8,0,0,1,8-8H208a8,8,0,0,1,8,8Zm-48,48a8,8,0,0,1-8,8H96a8,8,0,0,1,0-16h64A8,8,0,0,1,168,224Z"
          ></path>
        </svg>
      </button>
    </div>
    <script>
      const disableCSSTransitions = () => {
        const css = document.createElement("style")
        css.appendChild(
          document.createTextNode(
            `* {
              -webkit-transition: none !important;
              -moz-transition: none !important;
              -o-transition: none !important;
              -ms-transition: none !important;
              transition: none !important;
            }`,
          ),
        )
        document.head.appendChild(css)

        return () => {
          const opacity = window.getComputedStyle(css).opacity
          if (opacity) {
            document.head.removeChild(css)
          }
        }
      }

      const toggleColorScheme = (isDark) => {
        const resetTransitions = disableCSSTransitions()

        if (isDark) {
          document.documentElement.classList.add("dark")
        } else {
          document.documentElement.classList.remove("dark")
        }

        resetTransitions()
      }

      const handleSelectColorScheme = (colorScheme) => {
        localStorage.setItem("colorScheme", colorScheme)
        switch (colorScheme) {
          case "light":
            toggleColorScheme(false)
            break
          case "dark":
            toggleColorScheme(true)
            break
          case "system":
            toggleColorScheme(window.matchMedia("(prefers-color-scheme: dark)").matches)
            break
        }
      }

      document
        .getElementById("light-theme-button")
        .addEventListener("click", () => handleSelectColorScheme("light"))
      document
        .getElementById("dark-theme-button")
        .addEventListener("click", () => handleSelectColorScheme("dark"))
      document
        .getElementById("system-theme-button")
        .addEventListener("click", () => handleSelectColorScheme("system"))

      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (event) => {
        if (localStorage.colorScheme === "system" || !localStorage.colorScheme) {
          toggleColorScheme(event.matches)
        }
      })
    </script>
    <script type="module">
      import { bootstrapGraphVisualizer } from "/src/bootstrap.ts"

      const appElement = document.getElementById("app")
      const scrollZoomToggle = document.getElementById("scroll-zoom-toggle")
      const zoomInButton = document.getElementById("zoom-in-button")
      const zoomOutButton = document.getElementById("zoom-out-button")

      if (
        !(appElement instanceof HTMLElement) ||
        !(scrollZoomToggle instanceof HTMLInputElement) ||
        !(zoomInButton instanceof HTMLButtonElement) ||
        !(zoomOutButton instanceof HTMLButtonElement)
      ) {
        throw new Error("Missing graph demo controls.")
      }

      const initialScrollZoomEnabled = appElement.dataset.scrollZoomEnabled !== "false"
      scrollZoomToggle.checked = initialScrollZoomEnabled

      const dispose = await bootstrapGraphVisualizer({
        scrollZoomEnabled: initialScrollZoomEnabled,
        onReady: (graphHandle) => {
          scrollZoomToggle.addEventListener("change", () => {
            graphHandle.setScrollZoomEnabled(scrollZoomToggle.checked)
          })
          zoomInButton.addEventListener("click", () => {
            graphHandle.zoomIn()
          })
          zoomOutButton.addEventListener("click", () => {
            graphHandle.zoomOut()
          })
        },
      })

      window.addEventListener(
        "beforeunload",
        () => {
          dispose()
        },
        { once: true },
      )
    </script>
  </body>
</html>
